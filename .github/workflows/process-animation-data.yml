name: Process Animation Data

on:
  workflow_dispatch:
    inputs:
      days_to_process:
        description: 'Number of recent days to process'
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev jq curl

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("sf", "dplyr", "jsonlite", "lubridate"), repos="https://cloud.r-project.org")'

      - name: Download and process polygon data
        env:
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
          DAYS_TO_PROCESS: ${{ github.event.inputs.days_to_process }}
        run: |
          Rscript process_animation_data.R

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: false
          commit_message: "Update animation data - ${{ github.run_number }}"

      - name: Summary
        run: |
          echo "✅ Animation data processed and deployed"
          echo "🌐 View at: https://evelynebrie.github.io/hq-outages-animation/"
